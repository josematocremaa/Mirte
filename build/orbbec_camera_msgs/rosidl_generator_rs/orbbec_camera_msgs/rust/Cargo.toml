[package]
name = "orbbec_camera_msgs"
version = "1.5.15"
edition = "2021"

[dependencies]
rosidl_runtime_rs = "0.6"
serde = { version = "1", optional = true, features = ["derive"] }
serde-big-array = { version = "0.5.1", optional = true }

# ROS Dependencies
geometry_msgs = "*"
sensor_msgs = "*"
builtin_interfaces = "*"
std_msgs = "*"

[features]
serde = ['dep:serde', 'dep:serde-big-array', 'rosidl_runtime_rs/serde', 'geometry_msgs/serde', 'sensor_msgs/serde', 'builtin_interfaces/serde', 'std_msgs/serde']

[package.metadata.ros-env]
include = true
